<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Support – Techs Shop</title>
  <link rel="stylesheet" href="shop.css" />
</head>

<body>

  <header>
    <div class="logo">
      <img src="BCO.171f3651-c10f-427b-9d9a-582f33c0a661.png" alt="Techs Shop Logo">
    </div>
    <nav>
      <a href=" index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="deal.html">Deals</a>
      <a href="support.html" class="active">Support</a>
      </nav>
  </header>

  <section class="hero">
    <h1>Support</h1>
    <p>Need help? We're here for you.</p>
  </section>
<section class="contact">
  <h2>Contact Us</h2>
  <form action="submit.html" method="get" class="contact-form">

    <label for="name" class="form-label">Your Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email" class="form-label">Your Email</label>
    <input type="email" id="email" name="email" required>

    <label for="message" class="form-label">Your Message</label>
    <textarea id="message" name="message" rows="5" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</section>




  <footer class="footer">
    © 2026 Tech Shop · All rights reserved · Support: support@tech.shop
  </footer>

</body>

</html>
